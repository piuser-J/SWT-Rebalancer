<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWT PIE Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bbg: {
                            bg: 'var(--color-bg)',
                            panel: 'var(--color-panel)',
                            border: 'var(--color-border)',
                            text: 'var(--color-text)',
                            muted: 'var(--color-muted)',
                            orange: 'var(--color-orange)',
                            green: 'var(--color-green)',
                            red: 'var(--color-red)',
                            cyan: 'var(--color-cyan)'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body class="bg-bbg-bg text-bbg-text font-sans antialiased min-h-screen terminal-grid selection:bg-bbg-orange selection:text-black">
    <!-- Top Nav Bar -->
    <header class="border-b border-bbg-border bg-bbg-panel/80 backdrop-blur-md sticky top-0 z-50">
        <div class="px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-bbg-orange animate-pulse shadow-[0_0_8px_var(--color-orange)]"></div>
                <h1 class="text-xl font-bold tracking-widest text-bbg-text uppercase"><span class="text-bbg-orange">SWT</span> PIE Terminal</h1>
            </div>
            <div class="text-bbg-muted text-xs font-mono flex items-center gap-4">
                <span id="clock" class="text-bbg-cyan hidden sm:inline"></span>
                <button id="theme-toggle" class="p-1.5 rounded-full bg-bbg-border/50 hover:bg-bbg-border text-bbg-text transition-colors" title="Toggle Theme">
                    <!-- Icon inserted via JS -->
                </button>
            </div>
        </div>
    </header>

    <div class="p-6 max-w-[1400px] mx-auto grid grid-cols-1 xl:grid-cols-12 gap-6">
        
        <!-- Left Column: Inputs -->
        <aside class="xl:col-span-4 space-y-6">
            <div class="bbg-panel p-5 relative overflow-hidden shadow-md">
                <!-- Decorative accent -->
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-bbg-orange to-bbg-cyan"></div>
                
                <div class="flex justify-between items-center mb-5 mt-1">
                    <h2 class="text-sm font-bold text-bbg-text uppercase tracking-wider">Current Snapshot</h2>
                    <div class="flex gap-2">
                        <button id="btn-clear" class="bbg-button text-[10px] uppercase font-bold tracking-widest px-3 py-1.5 rounded" title="Clear all inputs">CLR</button>
                        <button id="btn-reset" class="bbg-button text-[10px] uppercase font-bold tracking-widest px-3 py-1.5 rounded" title="Reset to base targets">RST</button>
                    </div>
                </div>

                <div class="space-y-4" id="inputs-container">
                    <!-- Dynamically generated -->
                </div>

                <div class="mt-6 pt-5 border-t border-bbg-border">
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-xs font-bold text-bbg-muted uppercase tracking-wider">Available Cash (SGD)</label>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-bbg-muted font-mono">$</span>
                        <input type="text" inputmode="numeric" id="input-cash" value="15,000" class="bbg-input font-mono w-full rounded py-2 pl-8 pr-3 text-right text-xl font-bold tracking-wide">
                    </div>
                </div>

                <button id="calc-btn" class="bbg-button-primary w-full mt-8 py-3 rounded text-sm tracking-widest flex justify-center items-center gap-2 group">
                    <svg class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    EXECUTE REBALANCE
                </button>
            </div>
        </aside>

        <!-- Right Column: Analytics & Execution -->
        <main class="xl:col-span-8 space-y-6 flex flex-col">
            
            <!-- Summary Bar -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bbg-panel p-4 border-l-2 border-l-bbg-cyan flex flex-col justify-center shadow-md">
                    <span class="text-[10px] text-bbg-muted uppercase font-bold tracking-widest mb-1">Total NAV</span>
                    <span class="text-2xl font-mono text-bbg-text tracking-tight" id="stat-total-value">--</span>
                </div>
                <div class="bbg-panel p-4 border-l-2 border-l-bbg-orange flex flex-col justify-center shadow-md">
                    <span class="text-[10px] text-bbg-muted uppercase font-bold tracking-widest mb-1">Trades Required</span>
                    <span class="text-2xl font-mono text-bbg-orange tracking-tight" id="stat-trades">--</span>
                </div>
                <div class="bbg-panel p-4 border-l-2 border-l-bbg-green flex flex-col justify-center shadow-md">
                    <span class="text-[10px] text-bbg-muted uppercase font-bold tracking-widest mb-1">Execution Vol</span>
                    <span class="text-2xl font-mono text-bbg-green tracking-tight" id="stat-volume">--</span>
                </div>
                <div class="bbg-panel p-4 border-l-2 border-l-bbg-border flex flex-col justify-center shadow-md">
                    <span class="text-[10px] text-bbg-muted uppercase font-bold tracking-widest mb-1">System Status</span>
                    <span class="text-xl font-mono text-bbg-muted tracking-widest mt-1" id="stat-status">STANDBY</span>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="flex-grow grid grid-cols-1 lg:grid-cols-2 gap-6 relative">
                <!-- Overlay for empty state -->
                <div id="empty-state" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-bbg-bg/80 backdrop-blur-sm border border-bbg-border rounded-lg transition-opacity duration-300">
                    <svg class="w-16 h-16 text-bbg-muted mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <p class="text-bbg-muted font-mono text-sm tracking-widest">AWAITING EXECUTION...</p>
                </div>

                <!-- Transaction Ledger -->
                <div class="bbg-panel shadow-md flex flex-col h-[520px]">
                    <div class="p-4 border-b border-bbg-border bg-bbg-bg/50">
                        <h3 class="text-sm font-bold text-bbg-text uppercase tracking-widest">Execution Ledger</h3>
                    </div>
                    <div class="flex-grow overflow-y-auto p-0">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-bbg-panel shadow-sm z-20">
                                <tr class="text-[10px] text-bbg-muted uppercase tracking-widest border-b border-bbg-border">
                                    <th class="p-4 font-bold">Act</th>
                                    <th class="p-4 font-bold">Ticker</th>
                                    <th class="p-4 font-bold text-right">Amt (SGD)</th>
                                </tr>
                            </thead>
                            <tbody id="transactions-body" class="divide-y divide-bbg-border/50 font-mono text-sm">
                                <!-- Dynamically generated -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Visualizations -->
                <div class="bbg-panel shadow-md flex flex-col h-[520px]">
                    <div class="p-4 border-b border-bbg-border bg-bbg-bg/50 flex justify-between items-center">
                        <h3 class="text-sm font-bold text-bbg-text uppercase tracking-widest">Allocation Matrix</h3>
                        <div class="flex gap-1 bg-bbg-bg p-1 rounded border border-bbg-border">
                            <button id="tab-before" class="text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded bg-bbg-border text-bbg-text transition-colors">Before</button>
                            <button id="tab-after" class="text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded text-bbg-muted hover:bg-bbg-border/50 transition-colors">After</button>
                        </div>
                    </div>
                    <div class="flex-grow p-4 relative flex items-center justify-center">
                        <div id="chart-container-before" class="w-full h-full absolute inset-0 p-6 transition-opacity duration-300">
                            <canvas id="chart-before"></canvas>
                        </div>
                        <div id="chart-container-after" class="w-full h-full absolute inset-0 p-6 opacity-0 pointer-events-none transition-opacity duration-300">
                            <canvas id="chart-after"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
    <script src="app.js?v=2"></script>
</body>
</html>
